<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정산</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #111827;
      --sub: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --shadow: 0 10px 24px rgba(17, 24, 39, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      background: linear-gradient(135deg, #1d4ed8, #2563eb 55%, #60a5fa);
      color: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    .hero p {
      margin: 0;
      opacity: 0.92;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h2, h3 {
      margin-top: 0;
    }

    .section + .section {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--sub);
      font-weight: 700;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      background: white;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.5;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary { background: var(--accent); color: white; }
    .secondary { background: #eef2ff; color: #3730a3; }
    .ghost { background: #f3f4f6; color: #374151; }
    .danger { background: #fee2e2; color: var(--danger); }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .summary-box {
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 16px;
      padding: 16px;
    }

    .summary-label {
      font-size: 12px;
      color: var(--sub);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 22px;
      font-weight: 900;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .item-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .item-title {
      font-weight: 800;
    }

    .muted {
      color: var(--sub);
      font-size: 13px;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }

    .empty {
      padding: 18px;
      text-align: center;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      color: var(--sub);
      background: #f8fafc;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--sub);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 900px) {
      .grid,
      .input-grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }
      .wrap { padding: 16px; }
      .hero h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Big Talkers 정산</h1>
      <p>참여자 이름만 등록하고, 안주 비용만 총액으로 입력하면 1인당 금액이 자동 계산됩니다. 음료는 각자 확인 후 따로 입금하는 방식 기준입니다.</p>
    </section>

    <div class="grid">
      <main class="card">
        <h2>입력</h2>

        <div class="section">
          <label for="meetingDate">날짜</label>
          <input id="meetingDate" type="date" />
        </div>

        <div class="section">
          <h3>참여자 추가</h3>
          <div class="input-grid">
            <div>
              <label for="memberName">이름</label>
              <input id="memberName" placeholder="예: 진경" />
            </div>
            <div>
              <label for="memberTable">테이블</label>
              <input id="memberTable" placeholder="예: A테이블" />
            </div>
          </div>
          <div class="row">
            <button class="primary" id="addMemberBtn" type="button">참여자 추가</button>
            <button class="ghost" id="sampleBtn" type="button">샘플 넣기</button>
            <button class="danger" id="resetBtn" type="button">전체 초기화</button>
          </div>
        </div>

        <div class="section">
          <h3>안주 총액</h3>
          <label for="expenseAmount">총 결제 금액</label>
          <input id="expenseAmount" type="number" min="0" placeholder="예: 148000" />
        </div>

        <div class="section">
          <h3>음료 메모</h3>
          <label for="drinkMemo">선택사항</label>
          <textarea id="drinkMemo" placeholder="예: 음료는 영수증 확인 후 각자 따로 입금"></textarea>
        </div>

        <div class="section">
          <h3>참여자 목록</h3>
          <div id="memberList" class="item-list"></div>
        </div>
      </main>

      <aside class="card">
        <h2>정산 결과</h2>

        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">총 참여자</div>
            <div class="summary-value" id="totalMembers">0명</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">안주 총액</div>
            <div class="summary-value" id="totalExpense">0원</div>
          </div>
          <div class="summary-box">
            <div class="summary-label">1인당 금액</div>
            <div class="summary-value" id="perPerson">0원</div>
          </div>
        </div>

        <div class="section">
          <h3>테이블별 참여자</h3>
          <div id="tableList" class="item-list"></div>
        </div>

        <div class="section">
          <h3>카톡 복사용 메시지</h3>
          <div class="item">
            <div class="item-top">
              <div class="item-title">전체 공지 메시지</div>
              <button class="secondary" id="copyBtn" type="button">복사</button>
            </div>
            <textarea id="messageBox" readonly></textarea>
          </div>
        </div>
      </aside>
    </div>

    <p class="footer-note">GitHub Pages에서는 파일 이름을 꼭 index.html로 두세요.</p>
  </div>

  <script>
    const state = {
      members: []
    };

    const $ = (id) => document.getElementById(id);

    function money(value) {
      return Number(value || 0).toLocaleString('ko-KR') + '원';
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeTable(text) {
      return String(text).trim().replace(/\s+/g, ' ');
    }

    function addMember() {
      const name = $('memberName').value.trim();
      const table = normalizeTable($('memberTable').value);

      if (!name || !table) {
        alert('이름과 테이블을 입력해주세요.');
        return;
      }

      const exists = state.members.some((member) => member.name === name && member.table === table);
      if (exists) {
        alert('같은 이름이 같은 테이블에 이미 있습니다.');
        return;
      }

      state.members.push({
        id: Date.now().toString() + Math.random().toString(16).slice(2),
        name,
        table
      });

      $('memberName').value = '';
      $('memberTable').value = '';
      render();
    }

    function removeMember(id) {
      state.members = state.members.filter((member) => member.id !== id);
      render();
    }

    function resetAll() {
      if (!confirm('전체 초기화할까요?')) return;
      state.members = [];
      $('expenseAmount').value = '';
      $('drinkMemo').value = '';
      $('meetingDate').value = new Date().toLocaleDateString('en-CA');
      render();
    }

    function getGroupedTables() {
      const grouped = {};
      state.members.forEach((member) => {
        if (!grouped[member.table]) grouped[member.table] = [];
        grouped[member.table].push(member);
      });
      return grouped;
    }

    function getSettlement() {
      const totalMembers = state.members.length;
      const totalExpense = Number($('expenseAmount').value || 0);
      const perPersonRaw = totalMembers > 0 ? totalExpense / totalMembers : 0;
      const perPersonRounded = Math.round(perPersonRaw);
      return { totalMembers, totalExpense, perPersonRounded, perPersonRaw };
    }

    function renderMembers() {
      const list = $('memberList');
      if (!state.members.length) {
        list.innerHTML = '<div class="empty">아직 참여자가 없습니다.</div>';
        return;
      }

      list.innerHTML = state.members.map((member) => `
        <div class="item">
          <div class="item-top">
            <div>
              <div class="item-title">${escapeHtml(member.name)}</div>
              <div class="muted">${escapeHtml(member.table)}</div>
            </div>
            <button class="danger" type="button" onclick="removeMember('${member.id}')">삭제</button>
          </div>
        </div>
      `).join('');
    }

    function renderTables() {
      const list = $('tableList');
      const grouped = getGroupedTables();
      const tables = Object.keys(grouped);
      const settlement = getSettlement();

      if (!tables.length) {
        list.innerHTML = '<div class="empty">테이블 정보가 아직 없습니다.</div>';
        return;
      }

      list.innerHTML = tables.map((tableName) => {
        const members = grouped[tableName];
        const tableTotal = Math.round(settlement.perPersonRaw * members.length);
        return `
          <div class="item">
            <div class="item-top">
              <div>
                <div class="item-title">${escapeHtml(tableName)}</div>
                <div class="muted">${members.map((member) => escapeHtml(member.name)).join(', ')}</div>
              </div>
              <span class="badge">${members.length}명</span>
            </div>
            <div class="muted" style="margin-top: 8px;">테이블 예상 합계: ${money(tableTotal)}</div>
          </div>
        `;
      }).join('');
    }

    function buildMessage() {
      const settlement = getSettlement();
      const dateValue = $('meetingDate').value;
      const formattedDate = dateValue ? new Date(dateValue).toLocaleDateString('ko-KR') : '날짜 미입력';
      const names = state.members.map((member) => member.name).join(', ');
      const drinkMemo = $('drinkMemo').value.trim();

      let text = '[Big Talkers 정산 안내]\n';
      text += '날짜: ' + formattedDate + '\n';
      text += '참여자: ' + (names || '없음') + '\n';
      text += '안주 총액: ' + money(settlement.totalExpense) + '\n';
      text += '1인당 금액: ' + money(settlement.perPersonRounded) + '\n';
      text += '\n음료는 각자 확인 후 따로 입금해주세요.';

      if (drinkMemo) {
        text += '\n메모: ' + drinkMemo;
      }

      return text;
    }

    function renderSummary() {
      const settlement = getSettlement();
      $('totalMembers').textContent = settlement.totalMembers + '명';
      $('totalExpense').textContent = money(settlement.totalExpense);
      $('perPerson').textContent = money(settlement.perPersonRounded);
      $('messageBox').value = buildMessage();
    }

    function copyMessage() {
      const text = $('messageBox').value;
      navigator.clipboard.writeText(text)
        .then(() => alert('복사했습니다.'))
        .catch(() => alert('복사에 실패했습니다. 직접 복사해주세요.'));
    }

    function loadSample() {
      state.members = [
        { id: '1', name: '진경', table: 'A테이블' },
        { id: '2', name: '민수', table: 'A테이블' },
        { id: '3', name: '서연', table: 'B테이블' },
        { id: '4', name: '현우', table: 'B테이블' }
      ];
      $('expenseAmount').value = '120000';
      $('meetingDate').value = new Date().toLocaleDateString('en-CA');
      $('drinkMemo').value = '음료는 각자 영수증 확인 후 따로 입금';
      render();
    }

    function render() {
      renderMembers();
      renderTables();
      renderSummary();
    }

    $('meetingDate').value = new Date().toLocaleDateString('en-CA');
    $('addMemberBtn').addEventListener('click', addMember);
    $('sampleBtn').addEventListener('click', loadSample);
    $('resetBtn').addEventListener('click', resetAll);
    $('expenseAmount').addEventListener('input', render);
    $('drinkMemo').addEventListener('input', render);
    $('copyBtn').addEventListener('click', copyMessage);

    window.removeMember = removeMember;

    render();
  </script>
</body>
</html>
